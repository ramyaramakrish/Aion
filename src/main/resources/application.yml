server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 64MB
      max-request-size: 128MB
  thymeleaf:
    cache: false
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.2
      embedding:
        options:
          model: nomic-embed-text

aion:
  output-dir: ./Output
