server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 64MB
      max-request-size: 128MB
  thymeleaf:
    cache: false

logging:
  level:
    org.apache.poi.ooxml.POIXMLDocumentPart: ERROR

aion:
  output-dir: ./Output
  documents-dir: ./Documents
  doc-buddy-similarity-threshold: 0.6
  gemini-api-key: ${GEMINI_API_KEY:}
  gemini-model: gemini-2.5-flash
  agent-temperature: 0.7
  agent-system-prompt: "You are an intelligent assistant for the Aion platform."
